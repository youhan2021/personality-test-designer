<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TEST_NAME}} · 人格测试</title>
  <style>
    /* ============================================================
       全局样式
    ============================================================ */
    :root {
      --primary: #6c5ce7;
      --primary-dark: #5a4bd1;
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #00cec9;
      --danger: #e17055;
      --success: #00b894;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* ============================================================
       进度条
    ============================================================ */
    .progress-wrap {
      width: 100%;
      max-width: 600px;
      margin-bottom: 30px;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #333;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-text {
      text-align: right;
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 6px;
    }

    /* ============================================================
       卡片容器
    ============================================================ */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ============================================================
       开始页
    ============================================================ */
    .start-screen h1 {
      font-size: 28px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .start-screen .subtitle {
      color: var(--text-dim);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .start-screen .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }
    .tag {
      background: rgba(108,92,231,0.15);
      color: var(--accent);
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 12px;
      border: 1px solid rgba(108,92,231,0.3);
    }

    /* ============================================================
       题目页
    ============================================================ */
    .question-text {
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 28px;
      color: var(--text);
    }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .opt-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px 20px;
      text-align: left;
      font-size: 16px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .opt-btn:hover {
      background: rgba(108,92,231,0.2);
      border-color: var(--primary);
      transform: translateX(4px);
    }
    .opt-btn:active { transform: scale(0.98); }
    .opt-label {
      display: inline-block;
      width: 28px;
      height: 28px;
      background: var(--primary);
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      font-size: 14px;
      font-weight: bold;
      margin-right: 12px;
      vertical-align: middle;
    }

    /* ============================================================
       结果页
    ============================================================ */
    .result-screen { text-align: center; }
    .result-label {
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .result-code {
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .result-name {
      font-size: 26px;
      margin-bottom: 8px;
    }
    .result-intro {
      color: var(--accent);
      font-size: 15px;
      margin-bottom: 28px;
    }
    .result-desc {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.8;
      text-align: left;
      margin-bottom: 28px;
      max-height: 200px;
      overflow-y: auto;
      padding: 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }
    .result-rank {
      text-align: left;
      margin-bottom: 24px;
    }
    .result-rank h3 {
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .rank-item {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.03);
      font-size: 14px;
    }
    .rank-item .num {
      width: 24px;
      height: 24px;
      background: var(--primary);
      border-radius: 50%;
      text-align: center;
      line-height: 24px;
      font-size: 12px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .rank-item .rname { flex: 1; }
    .rank-item .rdist {
      color: var(--text-dim);
      font-size: 12px;
      margin-left: 12px;
    }

    /* 雷达图 */
    .chart-wrap { margin: 0 auto 24px; }
    canvas#radar { display: block; margin: 0 auto; }

    /* 重新测试 */
    .restart-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 99px;
      padding: 14px 36px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .restart-btn:hover { background: var(--primary-dark); }

    /* ============================================================
       隐藏
    ============================================================ */
    .hidden { display: none !important; }

    /* ============================================================
       特殊题提示（如果有）
    ============================================================ */
    .special-hint {
      background: rgba(225,112,85,0.15);
      border: 1px solid rgba(225,112,85,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ============================================================
     进度条
============================================================ -->
<div class="progress-wrap hidden" id="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-text" id="progress-text">0 / 0</div>
</div>

<!-- ============================================================
     开始页
============================================================ -->
<div class="card start-screen" id="start-screen">
  <h1>{{TEST_NAME}}</h1>
  <p class="subtitle">{{TEST_SUBTITLE}}</p>
  <div class="tags">
    <span class="tag">{{TOTAL_QUESTIONS}} 道题</span>
    <span class="tag">{{PERSONALITY_COUNT}} 种人格</span>
    <span class="tag">{{HIDDEN_COUNT}} 个隐藏人格</span>
  </div>
  <button class="restart-btn" onclick="startQuiz()" style="width:100%;">开始测试 →</button>
</div>

<!-- ============================================================
     题目页
============================================================ -->
<div class="card hidden" id="question-screen">
  <div class="special-hint hidden" id="special-hint"></div>
  <p class="question-text" id="q-text">题目加载中...</p>
  <div class="options" id="options"></div>
</div>

<!-- ============================================================
     结果页
============================================================ -->
<div class="card result-screen hidden" id="result-screen">
  <p class="result-label">你的性格是</p>
  <div class="result-code" id="r-code">???</div>
  <div class="result-name" id="r-name">加载中...</div>
  <div class="result-intro" id="r-intro"></div>
  <div class="chart-wrap">
    <canvas id="radar" width="280" height="280"></canvas>
  </div>
  <div class="result-desc" id="r-desc"></div>
  <div class="result-rank" id="r-rank">
    <h3>人格匹配排行榜</h3>
    <div id="rank-list"></div>
  </div>
  <button class="restart-btn" onclick="restart()">重新测试 ↻</button>
</div>

<!-- ============================================================
     核心逻辑
============================================================ -->
<script>
// ================================================================
//  【第一步：修改这里的数据】
// ================================================================

// 维度定义（15维，顺序对应 pattern）
const DIM_ORDER = ["S1","S2","S3","E1","E2","E3","A1","A2","A3","Ac1","Ac2","Ac3","So1","So2","So3"];

// 维度中文名（用于雷达图标签，可选）
const DIM_LABELS = {
  S1:"自我认知",S2:"内在驱动",S3:"上进心",
  E1:"信任感",E2:"投入度",E3:"独立/依赖",
  A1:"善恶观",A2:"行动风格",A3:"目标感",
  Ac1:"冒险/保守",Ac2:"果断/犹豫",Ac3:"计划性",
  So1:"线下社交",So2:"亲密度",So3:"自我呈现"
};

// 主测试题（30道，格式：id / dim / text / options）
const QUESTIONS = [
  { id:"q1", dim:"S1", text:"我的题目文字1", options:[
    { label:"A选项文字", value:1 },
    { label:"B选项文字", value:2 },
    { label:"C选项文字", value:3 }
  ]},
  // ... 继续添加 q2 - q30
  // 替换为你的实际题目
];

// 特殊题（可选，用于触发隐藏人格）
const SPECIAL_QUESTIONS = [
  // 格式示例：
  // {
  //   id:"drink_gate_q1",
  //   text:"您平时有什么爱好？",
  //   options:[
  //     { label:"吃喝拉撒", value:1 },
  //     { label:"艺术爱好", value:2 },
  //     { label:"饮酒", value:3 },
  //     { label:"健身", value:4 }
  //   ],
  //   triggerNext:{ 3:"drink_gate_q2" } // value=3 时插入下一题
  // },
];

// 追问题（配合特殊题使用）
const FOLLOWUP_QUESTIONS = {
  // "drink_gate_q2": {
  //   text:"您对饮酒的态度是？",
  //   options:[
  //     { label:"小酌怡情", value:1 },
  //     { label:"白酒保温杯", value:2 }
  //   ],
  //   triggerHidden:{ 2:"DRUNK" } // value=2 时触发隐藏人格
  // }
};

// 标准人格类型（25种）
const STANDARD_TYPES = [
  // 格式：{ code:"CTRL", cn:"拿捏者", pattern:"HHH-HMH-MHH-HHH-MHM", intro:"一句话简介", desc:"详细描述..." }
  // 替换为你的实际人格
  { code:"TYPE1", cn:"类型1", pattern:"HHH-HMH-MHH-HHH-MHM", intro:"Intro1", desc:"Desc1" },
];

// 隐藏人格（2种）
const SPECIAL_TYPES = [
  // { code:"HHHH", cn:"傻乐者", intro:"哈哈哈哈。", desc:"描述..." },
  // { code:"DRUNK", cn:"酒鬼", intro:"烈酒烧喉", desc:"描述..." },
];

// 兜底阈值（similarity < 此值时触发 HHHH）
const FALLBACK_THRESHOLD = 60;

// ================================================================
//  【第二步：修改配置】
// ================================================================

// 评分阈值
const LEVEL_THRESHOLDS = { L:[2,3], M:[4,4], H:[5,6] };
const LEVEL_NUM = { L:1, M:2, H:3 };
const MAX_DISTANCE = 30; // 15维 × 2级差

// ================================================================
//  【以下代码通常不需要修改】
// ================================================================

let state = {
  current: 0,
  answers: {},
  queue: [],         // 包含追问的完整题序
  isSpecial: false,   // 当前是否在特殊题流程
  isDrunk: false,    // 隐藏人格触发标记
  insertFollowup: null, // 追问题ID，答完后恢复主流程
};

// 工具函数
function parsePattern(p) { return p.replace(/-/g,'').split(''); }
function calcDimScores(answers) {
  const scores = {};
  for (const q of QUESTIONS) {
    if (answers[q.id] == null) continue;
    scores[q.dim] = (scores[q.dim]||0) + answers[q.id];
  }
  return scores;
}
function scoresToLevels(scores) {
  const levels = {};
  for (const [dim,score] of Object.entries(scores)) {
    if (score <= LEVEL_THRESHOLDS.L[1]) levels[dim]='L';
    else if (score >= LEVEL_THRESHOLDS.H[0]) levels[dim]='H';
    else levels[dim]='M';
  }
  return levels;
}
function matchType(userLevels, pattern) {
  const tp = parsePattern(pattern);
  let dist=0, exact=0;
  for (let i=0;i<DIM_ORDER.length;i++) {
    const u = LEVEL_NUM[userLevels[DIM_ORDER[i]]||'M'];
    const t = LEVEL_NUM[tp[i]||'M'];
    dist += Math.abs(u-t);
    if (u===t) exact++;
  }
  return { distance:dist, exact, similarity: Math.max(0,Math.round((1-dist/MAX_DISTANCE)*100)) };
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// 启动测试
function startQuiz() {
  state = { current:0, answers:{}, queue:shuffle([...QUESTIONS]), isSpecial:false, isDrunk:false, insertFollowup:null };
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('question-screen').classList.remove('hidden');
  document.getElementById('special-hint').classList.add('hidden');
  renderQuestion();
}

// 渲染题目
function renderQuestion() {
  const q = state.queue[state.current];
  if (!q) { finishQuiz(); return; }

  // 更新进度
  document.getElementById('progress-fill').style.width = ((state.current)/state.queue.length*100)+'%';
  document.getElementById('progress-text').textContent = `${state.current} / ${state.queue.length}`;

  // 特殊题提示
  if (q._special) {
    const hint = document.getElementById('special-hint');
    hint.textContent = q._hint||'这是一道特殊题目';
    hint.classList.remove('hidden');
  } else {
    document.getElementById('special-hint').classList.add('hidden');
  }

  // 题目文本
  document.getElementById('q-text').textContent = q.text;

  // 选项
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const labels = ['A','B','C','D'];
  q.options.forEach((opt,idx)=>{
    const btn = document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`<span class="opt-label">${labels[idx]||(idx+1)}</span>${opt.label}`;
    btn.onclick=()=>selectOption(q,opt.value);
    opts.appendChild(btn);
  });
}

// 选答案
function selectOption(q, value) {
  state.answers[q.id] = value;

  // 特殊题触发追问
  if (q.triggerNext && q.triggerNext[value] && FOLLOWUP_QUESTIONS[q.triggerNext[value]]) {
    const followupId = q.triggerNext[value];
    const followup = { ...FOLLOWUP_QUESTIONS[followupId], id:followupId, _special:true, _hint:"特殊追问" };
    state.queue.splice(state.current+1, 0, followup);
  }

  // 追问触发隐藏人格
  if (q.triggerHidden && q.triggerHidden[value]) {
    const hiddenCode = q.triggerHidden[value];
    state.isDrunk = true;
    state.hiddenCode = hiddenCode;
  }

  state.current++;
  renderQuestion();
}

// 完成测试 → 计算结果
function finishQuiz() {
  document.getElementById('question-screen').classList.add('hidden');
  document.getElementById('progress-wrap').classList.add('hidden');
  const rs = document.getElementById('result-screen');
  rs.classList.remove('hidden');

  // 隐藏人格强制触发
  if (state.isDrunk && state.hiddenCode) {
    const hidden = SPECIAL_TYPES.find(t=>t.code===state.hiddenCode);
    if (hidden) {
      const scores = calcDimScores(state.answers);
      const levels = scoresToLevels(scores);
      const allTypes = STANDARD_TYPES.map(t=>({...t,...matchType(levels,t.pattern)}));
      allTypes.sort((a,b)=>a.distance-b.distance||b.exact-a.exact||b.similarity-a.similarity);
      showResult(hidden.code, hidden.cn, hidden.intro, hidden.desc, allTypes, levels, true);
      return;
    }
  }

  // 正常评分
  const scores = calcDimScores(state.answers);
  const levels = scoresToLevels(scores);
  const allTypes = STANDARD_TYPES.map(t=>({...t,...matchType(levels,t.pattern)}));
  allTypes.sort((a,b)=>a.distance-b.distance||b.exact-a.exact||b.similarity-a.similarity);
  const best = allTypes[0];

  // 兜底
  if (best.similarity < FALLBACK_THRESHOLD) {
    const fallback = SPECIAL_TYPES.find(t=>t.code==='HHHH')||SPECIAL_TYPES[0];
    showResult(fallback.code, fallback.cn, fallback.intro, fallback.desc, allTypes, levels, false);
  } else {
    showResult(best.code, best.cn, best.intro, best.desc, allTypes, levels, false);
  }
}

// 展示结果
function showResult(code, cn, intro, desc, rankings, levels, isHidden) {
  document.getElementById('r-code').textContent = code;
  document.getElementById('r-name').textContent = cn;
  document.getElementById('r-intro').textContent = intro;
  document.getElementById('r-desc').textContent = desc;

  // 排行榜
  const list = document.getElementById('rank-list');
  list.innerHTML = '';
  rankings.slice(0,5).forEach((t,i)=>{
    const div = document.createElement('div');
    div.className='rank-item';
    div.innerHTML=`<span class="num">${i+1}</span><span class="rname">${t.code} (${t.cn})</span><span class="rdist">距离 ${t.distance}</span>`;
    list.appendChild(div);
  });

  // 雷达图
  drawRadar(levels);
}

// 雷达图
function drawRadar(userLevels) {
  const canvas = document.getElementById('radar');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width/2, cy = canvas.height/2;
  const r = 100;
  const n = DIM_ORDER.length;
  const angleStep = (2*Math.PI)/n;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 背景五边形网格
  for (let level=1; level<=3; level++) {
    ctx.beginPath();
    for (let i=0;i<=n;i++) {
      const angle = i*angleStep - Math.PI/2;
      const radius = r * level / 3;
      const x = cx + radius*Math.cos(angle);
      const y = cy + radius*Math.sin(angle);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 轴线
  for (let i=0;i<n;i++) {
    const angle = i*angleStep - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(angle), cy+r*Math.sin(angle));
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.stroke();
  }

  // 标签
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='11px PingFang SC';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  for (let i=0;i<n;i++) {
    const angle = i*angleStep - Math.PI/2;
    const x = cx + (r+18)*Math.cos(angle);
    const y = cy + (r+18)*Math.sin(angle);
    ctx.fillText(DIM_LABELS[DIM_ORDER[i]]||DIM_ORDER[i], x, y);
  }

  // 数据区域
  ctx.beginPath();
  for (let i=0;i<n;i++) {
    const val = LEVEL_NUM[userLevels[DIM_ORDER[i]]||'M'];
    const angle = i*angleStep - Math.PI/2;
    const radius = r * val / 3;
    const x = cx + radius*Math.cos(angle);
    const y = cy + radius*Math.sin(angle);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(108,92,231,0.3)';
  ctx.fill();
  ctx.strokeStyle='var(--accent)';
  ctx.lineWidth=2;
  ctx.stroke();

  // 数据点
  for (let i=0;i<n;i++) {
    const val = LEVEL_NUM[userLevels[DIM_ORDER[i]]||'M'];
    const angle = i*angleStep - Math.PI/2;
    const radius = r * val / 3;
    ctx.beginPath();
    ctx.arc(cx+radius*Math.cos(angle), cy+radius*Math.sin(angle), 4, 0, 2*Math.PI);
    ctx.fillStyle='var(--accent)';
    ctx.fill();
  }
}

// 重新测试
function restart() {
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
}

// 页面加载时显示开始页
document.getElementById('progress-wrap').classList.add('hidden');
</script>
</body>
</html>
